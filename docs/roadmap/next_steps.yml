# SkiaKrita – Roadmap & Next Steps
# Updated: PR #3 Win32 GUI

current_state:
  description: >
    Win32 GUI shell fully wired.  krita_gui opens an 800×600 window,
    composites the Document via Renderer, blits via StretchDIBits.
    Mouse events translate to MouseEvent → BrushTool → real-time
    brush strokes on the active layer.  Core model (Document, Layer,
    BrushStroke, Command/Undo, Selection, Tool, BrushTool) is pure
    C++20.  All Skia usage confined to graphics_skia (pimpl).
  milestone: "PR #3 – Win32 GUI Shell"
  implemented:
    - "apps/krita_gui: WinMain, App controller, Win32Window (HWND wrapper)"
    - "Win32Window: WM_PAINT → composite blit, WM_MOUSE → BrushTool, WM_SIZE"
    - "core::MouseEvent, core::Tool (abstract), core::BrushTool (concrete)"
    - "BrushTool: per-segment RenderCallback → Renderer::renderBrushStroke"
    - "Renderer::getCompositeBuffer() zero-copy pixel view for StretchDIBits"
    - "gui.puml: GUI-specific architecture diagram"
    - "apps/krita_shell: console pipeline demo (unchanged)"
    - "All previous core + graphics_skia implementations"

next_task_candidates:
  - id: command-implementations
    title: "Concrete Command implementations + wired undo"
    description: >
      BrushStrokeCommand (pixel snapshot for undo), LayerAddCommand,
      LayerRemoveCommand.  Wire Ctrl+Z / Ctrl+Y in krita_gui.
    priority: high

  - id: brush-engine-advanced
    title: "Advanced brush engine features"
    description: >
      Pressure-dependent size/opacity, dab-based rendering (spacing),
      soft/hard brush profiles, smudge brush.
    priority: high

  - id: color-management
    title: "Color space / management in core"
    description: >
      Implement core::ColorSpace, ICC profile support, color-managed pipeline.
    priority: high

  - id: render-tests
    title: "Pixel-level rendering regression tests"
    description: >
      Golden-image based tests with CTest / VS Test Explorer.
    priority: medium

  - id: ci-pipeline
    title: "GitHub Actions CI (Windows)"
    description: >
      Automated build + test on push/PR.  vcpkg binary caching.
    priority: medium

  - id: input-abstraction
    title: "Tablet / stylus input (WM_POINTER / Ink API)"
    description: >
      Pressure & tilt via WM_POINTER in Win32Window.
    priority: medium

  - id: gui-toolbar
    title: "Minimal toolbar / color picker in krita_gui"
    description: >
      Add brush size slider, color picker, layer list panel.
    priority: medium

  - id: macos-port
    title: "macOS build & shell (Cocoa / Metal)"
    description: >
      Verify libs/ compile on macOS.  Add Cocoa application shell.
    priority: low

definition_of_done:
  - "All projects build cleanly (VS2026, x64, Debug & Release, /W4, zero warnings)"
  - "krita_shell runs and produces expected console output"
  - "Unit / rendering tests pass (when added)"
  - "UML diagrams (.puml) reflect current implementation"
  - "README is up to date with build and usage instructions"
