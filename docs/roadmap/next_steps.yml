# SkiaKrita -- Roadmap & Next Steps
# Updated: PR #4 Undo / Pressure / Keyboard

current_state:
  description: >
    Undo/Redo pipeline fully wired.  BrushTool snapshots layer pixels
    on press, creates BrushStrokeCommand on release, pushes to
    CommandHistory via callback.  Ctrl+Z / Ctrl+Y in krita_gui invoke
    undo/redo.  Brush stroke rendering is pressure-sensitive (per-segment
    width = brush size * average pressure).  Keyboard events translated
    via WM_KEYDOWN -> KeyEvent -> App.
  milestone: "PR #4 -- Undo / Pressure / Keyboard"
  implemented:
    - "core::BrushStrokeCommand: pixel-snapshot undo/redo for brush strokes"
    - "core::KeyEvent, KeyModifiers, Key enum in input_event.h"
    - "BrushTool: CommandCallback -- pushes BrushStrokeCommand on stroke end"
    - "BrushTool: pixel snapshot before drawing, captureAfter on release"
    - "Win32Window: WM_KEYDOWN handler, VK->Key translation, KeyCallback"
    - "App: core::CommandHistory, Ctrl+Z=undo, Ctrl+Y=redo + invalidate"
    - "Renderer::renderBrushStroke: per-segment pressure-sensitive width"
    - "All previous core + graphics_skia + GUI implementations"

next_task_candidates:
  - id: additional-commands
    title: "Additional Command implementations"
    description: >
      LayerAddCommand, LayerRemoveCommand, LayerReorderCommand.
      Generic property-change commands for layer opacity/visibility.
    priority: high

  - id: brush-engine-advanced
    title: "Advanced brush engine features"
    description: >
      Pressure-dependent opacity, dab-based rendering (spacing),
      soft/hard brush profiles, smudge brush.
    priority: high

  - id: color-management
    title: "Color space / management in core"
    description: >
      Implement core::ColorSpace, ICC profile support, color-managed pipeline.
    priority: high

  - id: render-tests
    title: "Pixel-level rendering regression tests"
    description: >
      Golden-image based tests with CTest / VS Test Explorer.
    priority: medium

  - id: ci-pipeline
    title: "GitHub Actions CI (Windows)"
    description: >
      Automated build + test on push/PR.  vcpkg binary caching.
    priority: medium

  - id: input-abstraction
    title: "Tablet / stylus input (WM_POINTER / Ink API)"
    description: >
      Pressure & tilt via WM_POINTER in Win32Window.
    priority: medium

  - id: gui-toolbar
    title: "Minimal toolbar / color picker in krita_gui"
    description: >
      Add brush size slider, color picker, layer list panel.
    priority: medium

  - id: macos-port
    title: "macOS build & shell (Cocoa / Metal)"
    description: >
      Verify libs/ compile on macOS.  Add Cocoa application shell.
    priority: low

definition_of_done:
  - "All projects build cleanly (VS2026, x64, Debug & Release, /W4, zero warnings)"
  - "krita_shell runs and produces expected console output"
  - "Unit / rendering tests pass (when added)"
  - "UML diagrams (.puml) reflect current implementation"
  - "README is up to date with build and usage instructions"
