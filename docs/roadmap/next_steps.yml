# SkiaKrita – Roadmap & Next Steps
# Updated: PR #2 Core Model

current_state:
  description: >
    Core model implemented: Document, Layer, BrushStroke, Command/Undo,
    Selection, Color types in libs/core (pure C++20).  Renderer in
    libs/graphics_skia composites layers and renders brush strokes via Skia.
    krita_shell demonstrates the full pipeline: create document → add layers
    → brush stroke → composite → PNG export.
  milestone: "PR #2 – Core Document Model & Renderer"
  implemented:
    - "Solution structure: apps/krita_shell, libs/core, libs/graphics_skia"
    - "vcpkg manifest mode with Skia dependency"
    - "Directory.Build.props for shared build settings (C++20, /W4, Unicode)"
    - "SkiaContext: raster surface, test pattern draw, PNG snapshot"
    - "core::Version compile-time and run-time info"
    - "core::Color value type + BlendMode enum"
    - "core::Layer with pixel buffer, visibility, opacity, blend mode (pimpl)"
    - "core::Document with layer stack management (add, remove, move, active)"
    - "core::BrushStroke / BrushSettings data model"
    - "core::CommandHistory with undo/redo stacks"
    - "core::Selection with rect selection and alpha mask"
    - "graphics::Renderer: layer compositing, brush stroke rendering, PNG export"
    - "UML documentation (PlantUML .puml) + Python SVG generator"
    - "README with build / UML / directory docs"

next_task_candidates:
  - id: color-management
    title: "Color space / management in core"
    description: >
      Implement core::ColorSpace, ICC profile support, color-managed pipeline.
      Integrate with SkiaContext color space handling.
    priority: high

  - id: render-tests
    title: "Pixel-level rendering regression tests"
    description: >
      Golden-image based tests: render known scenes, compare output PNGs
      against reference images.  Integrate with CTest or VS Test Explorer.
    priority: high

  - id: brush-engine-advanced
    title: "Advanced brush engine features"
    description: >
      Pressure-dependent size/opacity, dab-based rendering (spacing),
      soft/hard brush profiles, smudge brush.
    priority: high

  - id: command-implementations
    title: "Concrete Command implementations"
    description: >
      BrushStrokeCommand (with pixel snapshot for undo), LayerAddCommand,
      LayerRemoveCommand, etc.  Wire into CommandHistory.
    priority: high

  - id: ci-pipeline
    title: "GitHub Actions CI (Windows)"
    description: >
      Automated build + test on push/PR.  vcpkg binary caching for speed.
    priority: medium

  - id: input-abstraction
    title: "Tablet / stylus input abstraction"
    description: >
      Platform-independent input layer in libs/core for pressure, tilt, etc.
      Windows implementation via WM_POINTER / Ink API.
    priority: medium

  - id: gui-shell-win32
    title: "Win32 window shell with Skia rendering"
    description: >
      Replace console shell with a minimal Win32 HWND that hosts a
      Skia raster or GPU surface.  Keep GUI code isolated in apps/.
    priority: medium

  - id: macos-port
    title: "macOS build & shell (Cocoa / Metal)"
    description: >
      Verify libs/core and libs/graphics_skia compile on macOS (Clang).
      Add a Cocoa application shell in apps/.
    priority: low

definition_of_done:
  - "All projects build cleanly (VS2026, x64, Debug & Release, /W4, zero warnings)"
  - "krita_shell runs and produces expected console output"
  - "Unit / rendering tests pass (when added)"
  - "UML diagrams (.puml) reflect current implementation"
  - "README is up to date with build and usage instructions"
